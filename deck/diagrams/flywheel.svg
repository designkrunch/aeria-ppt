<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" role="img" aria-label="Aeria Data Flywheel and six moats showing why the platform compounds and cannot be copied">

  <defs>
    <radialGradient id="flywheel-bg" cx="35%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="accent-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="700" fill="url(#flywheel-bg)"/>

  <!-- ===================== FLYWHEEL ===================== -->
  <!-- Centre: x=480 y=320, radius=220 -->

  <!-- Outer ring track -->
  <circle cx="480" cy="320" r="220" stroke="#1a2a3a" stroke-width="1.5" fill="none"/>
  <circle cx="480" cy="320" r="216" stroke="#0ea5e9" stroke-width="0.5" fill="none" stroke-dasharray="4 6" opacity="0.4"/>

  <!-- Flywheel center -->
  <circle cx="480" cy="320" r="72" fill="#060e16" stroke="#0d2035" stroke-width="1.5"/>
  <text x="480" y="312" font-family="'Inter', monospace" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#0ea5e9" text-anchor="middle">ONE SYSTEM</text>
  <text x="480" y="330" font-family="'Inter', monospace" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#0ea5e9" text-anchor="middle">OF RECORD</text>
  <text x="480" y="348" font-family="'Archivo', sans-serif" font-size="10" fill="#444" text-anchor="middle">proprietary rails</text>

  <!-- ===================== FLYWHEEL NODES (5 nodes clockwise) ===================== -->
  <!-- Node positions on circle r=220:
       Occupants:    top    (480, 100)   → angle 270°
       Data:         top-right (680, 188) → angle 338°... let me recalculate

       Actually let me use angles:
       Occupants     = 270° (top)          = (480+0,    320-220) = (480, 100)
       Data          = 342° (top-right)    = (480+220*cos(342), 320+220*sin(342))
                     cos(342)=0.951, sin(342)=-0.309 → (480+209, 320-68) = (689, 252)
       Intelligence  = 54°  (right-bottom) = (480+220*cos(54),  320+220*sin(54))
                     cos(54)=0.588, sin(54)=0.809 → (480+129, 320+178) = (609, 498)
       Recommendations = 126° (bottom-left) = (480+220*cos(126), 320+220*sin(126))
                     cos(126)=-0.588, sin(126)=0.809 → (480-129, 320+178) = (351, 498)
       Commerce      = 198° (left)          = (480+220*cos(198), 320+220*sin(198))
                     cos(198)=-0.951, sin(198)=-0.309 → (480-209, 320-68) = (271, 252)
  -->

  <!-- Connecting arcs between nodes (curved arrows) -->
  <!-- Occupants → Data -->
  <path d="M 490 104 A 220 220 0 0 1 679 256" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#fly-arrow)"/>
  <!-- Data → Intelligence -->
  <path d="M 685 268 A 220 220 0 0 1 605 490" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#fly-arrow)"/>
  <!-- Intelligence → Recommendations -->
  <path d="M 595 502 A 220 220 0 0 1 361 502" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#fly-arrow)"/>
  <!-- Recommendations → Commerce -->
  <path d="M 355 490 A 220 220 0 0 1 275 268" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#fly-arrow)"/>
  <!-- Commerce → Occupants -->
  <path d="M 275 250 A 220 220 0 0 1 470 104" stroke="#0ea5e9" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#fly-arrow)"/>

  <defs>
    <marker id="fly-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#0ea5e9" opacity="0.7"/>
    </marker>
  </defs>

  <!-- NODE: Occupants (top) -->
  <circle cx="480" cy="100" r="32" fill="#060e16" stroke="#0ea5e9" stroke-width="1.5" filter="url(#node-glow)"/>
  <text x="480" y="96" font-family="'Archivo', sans-serif" font-size="11" fill="#ccc" text-anchor="middle">Occupants</text>
  <text x="480" y="112" font-family="'Inter', monospace" font-size="9" fill="#0ea5e9" text-anchor="middle">interact</text>

  <!-- NODE: Data (top-right) — EMPHASIZED -->
  <circle cx="689" cy="252" r="38" fill="#041020" stroke="#0ea5e9" stroke-width="2" filter="url(#node-glow)"/>
  <circle cx="689" cy="252" r="34" fill="#051828" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="689" y="248" font-family="'Archivo', sans-serif" font-size="12" font-weight="600" fill="#0ea5e9" text-anchor="middle">Data</text>
  <text x="689" y="264" font-family="'Inter', monospace" font-size="9" fill="#0ea5e9" text-anchor="middle">proprietary</text>

  <!-- NODE: Intelligence (bottom-right) -->
  <circle cx="609" cy="498" r="32" fill="#060e16" stroke="#0ea5e9" stroke-width="1.5" filter="url(#node-glow)"/>
  <text x="609" y="494" font-family="'Archivo', sans-serif" font-size="11" fill="#ccc" text-anchor="middle">Intelligence</text>
  <text x="609" y="510" font-family="'Inter', monospace" font-size="9" fill="#0ea5e9" text-anchor="middle">insights</text>

  <!-- NODE: Recommendations (bottom-left) -->
  <circle cx="351" cy="498" r="32" fill="#060e16" stroke="#0ea5e9" stroke-width="1.5" filter="url(#node-glow)"/>
  <text x="351" y="494" font-family="'Archivo', sans-serif" font-size="10" fill="#ccc" text-anchor="middle">Recom-</text>
  <text x="351" y="508" font-family="'Archivo', sans-serif" font-size="10" fill="#ccc" text-anchor="middle">mendations</text>

  <!-- NODE: Commerce (top-left) — EMPHASIZED with accent -->
  <circle cx="271" cy="252" r="38" fill="#1a0804" stroke="#f5330e" stroke-width="2" filter="url(#accent-glow)"/>
  <circle cx="271" cy="252" r="34" fill="#150603" stroke="#f5330e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="271" y="248" font-family="'Archivo', sans-serif" font-size="12" font-weight="600" fill="#f5330e" text-anchor="middle">Commerce</text>
  <text x="271" y="264" font-family="'Inter', monospace" font-size="9" fill="#f5330e" text-anchor="middle">revenue</text>

  <!-- ===================== MOAT SPOKES (6 spokes radiating out) ===================== -->
  <!-- Spokes go from r=220 outward to r=320, between flywheel nodes -->
  <!-- Spoke 1: Workflow (between Commerce and Occupants) ~ 234°... let me space evenly between nodes at 30° intervals -->
  <!-- Spokes at: 309°, 21°, 90°, 162°, 234° (midpoints between nodes) -->

  <!-- Spoke 1: between Commerce(198°) and Occupants(270°) → 234° -->
  <!-- x = 480 + 270*cos(234), y = 320 + 270*sin(234) = 480-158, 320-218 = 322,102 -->
  <line x1="480" y1="320" x2="322" y2="102" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="296" y="88" font-family="'Inter', monospace" font-size="10" font-weight="500" fill="#666" text-anchor="middle">Workflow</text>
  <text x="296" y="102" font-family="'Archivo', sans-serif" font-size="9" fill="#444" text-anchor="middle">30 tools → 1 system</text>

  <!-- Spoke 2: between Occupants(270°) and Data(342°) → 306° -->
  <!-- x = 480 + 290*cos(306), y = 320 + 290*sin(306) = 480+171, 320-235 = 651,85 -->
  <line x1="480" y1="320" x2="651" y2="85" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="676" y="72" font-family="'Inter', monospace" font-size="10" font-weight="500" fill="#666" text-anchor="middle">Data Flywheel</text>
  <text x="676" y="86" font-family="'Archivo', sans-serif" font-size="9" fill="#444" text-anchor="middle">cross-portfolio behavior</text>

  <!-- Spoke 3: between Data(342°) and Intelligence(54°) → 18° -->
  <!-- x = 480 + 290*cos(18), y = 320 + 290*sin(18) = 480+276, 320+90 = 756,410 -->
  <line x1="480" y1="320" x2="800" y2="380" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="832" y="368" font-family="'Inter', monospace" font-size="10" font-weight="500" fill="#666">Distribution</text>
  <text x="832" y="382" font-family="'Archivo', sans-serif" font-size="9" fill="#444">3-yr locks + expand</text>

  <!-- Spoke 4: between Intelligence(54°) and Recommendations(126°) → 90° -->
  <line x1="480" y1="320" x2="780" y2="570" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="810" y="555" font-family="'Inter', monospace" font-size="10" font-weight="500" fill="#666">Integration</text>
  <text x="810" y="569" font-family="'Archivo', sans-serif" font-size="9" fill="#444">hardware + turnstiles</text>

  <!-- Spoke 5: between Recommendations(126°) and Commerce(198°) → 162° -->
  <line x1="480" y1="320" x2="200" y2="570" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="170" y="555" font-family="'Inter', monospace" font-size="10" font-weight="500" fill="#666" text-anchor="end">Compliance</text>
  <text x="170" y="569" font-family="'Archivo', sans-serif" font-size="9" fill="#444" text-anchor="end">zero-knowledge onboarding</text>

  <!-- Spoke 6: AI moat (extra, pointing left) -->
  <line x1="480" y1="320" x2="120" y2="270" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="110" y="258" font-family="'Inter', monospace" font-size="10" font-weight="500" fill="#666" text-anchor="end">AI Orchestration</text>
  <text x="110" y="272" font-family="'Archivo', sans-serif" font-size="9" fill="#444" text-anchor="end">domain agents on commodity models</text>

  <!-- ===================== INSET BOX (bottom-right) ===================== -->
  <rect x="950" y="460" width="420" height="110" rx="10" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <text x="970" y="488" font-family="'Inter', monospace" font-size="10" font-weight="600" letter-spacing="0.08em" fill="#555">MODEL FRAMING</text>
  <line x1="970" y1="496" x2="1350" y2="496" stroke="#1a1a1a" stroke-width="1"/>
  <text x="970" y="518" font-family="'Archivo', sans-serif" font-size="14" fill="#888">commodity model in</text>
  <text x="1170" y="518" font-family="'Archivo', sans-serif" font-size="14" fill="#444">→</text>
  <text x="1190" y="518" font-family="'Archivo', sans-serif" font-size="14" fill="#f5330e">our IP around it</text>
  <text x="970" y="542" font-family="'Archivo', sans-serif" font-size="12" fill="#444">orchestration · integrations · data · contracts</text>
  <text x="970" y="562" font-family="'Inter', monospace" font-size="10" fill="#333">Agents are a feature. The rails are the product.</text>

  <!-- ===================== TITLE AREA (right) ===================== -->
  <text x="870" y="90" font-family="'Plus Jakarta Sans', sans-serif" font-size="22" font-weight="700" fill="#fff">Six moats:</text>
  <g font-family="'Archivo', sans-serif" font-size="13" fill="#888">
    <text x="870" y="122">1. Workflow — 30 tools → one system of record</text>
    <text x="870" y="148">2. Data — proprietary cross-portfolio behaviour</text>
    <text x="870" y="174">3. Distribution — 3-yr locks + landed-expanded</text>
    <text x="870" y="200">4. Integration — hardware + physical actions</text>
    <text x="870" y="226">5. Compliance — zero-knowledge onboarding</text>
    <text x="870" y="252">6. AI — domain orchestration on commodity models</text>
  </g>

  <!-- Accent bar on moat list -->
  <rect x="860" y="106" width="3" height="158" rx="2" fill="#f5330e" opacity="0.5"/>

</svg>
